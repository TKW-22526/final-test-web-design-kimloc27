<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div id="message" class="alert alert-success text-center"
     style="display:none; position:fixed; top:50%; left:50%;
     transform:translate(-50%,-50%); z-index:9999;">
    🎉 Chúc mừng bạn đã mua hàng thành công!
</div>

    <div class="container my-5">

        <h2 class="mb-4 text-center fw-bold">
            🛒 Giỏ Hàng Của Bạn
        </h2>

        <div class="table-responsive">

            <table class="table table-bordered align-middle text-center">

                <thead class="table-warning">
                    <tr>
                        <th>Ảnh</th>
                        <th>Sản phẩm</th>
                        <th>Giá</th>
                        <th>Số lượng</th>
                        <th>Thành tiền</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>

                <tbody id="cart-body"></tbody>

            </table>

        </div>

        <div class="text-end">

            <h4 class="fw-bold">
                Tổng tiền:
                <span id="total-price" class="text-danger">
                    0 VNĐ
                </span>
            </h4>

        </div>

        <div class="mt-4 d-flex justify-content-between">

            <a href="san-pham.html" class="btn btn-secondary">
                ← Tiếp tục mua hàng
            </a>

          <button class="btn btn-success" onclick="checkout()">
              Thanh toán
          </button>

        </div>

    </div>
    

    <script>

        function loadCart() {

            let cart = JSON.parse(localStorage.getItem("trasua_cart")) || [];

            let html = "";
            let total = 0;

            cart.forEach(item => {

                let price = parseInt(
                    item.price.replace(/\./g, "")
                              .replace(" VNĐ", "")
                );

                let subtotal = price * item.quantity;

                total += subtotal;

                html += `
                    <tr>

                        <td>
                            <img src="${item.image}"
                                 width="80"
                                 height="80"
                                 style="object-fit:cover;">
                        </td>

                        <td>${item.name}</td>

                        <td>${item.price}</td>

                        <td>
                            <button class="btn btn-sm btn-danger"
                                onclick="changeQty(${item.id}, -1)">
                                -
                            </button>

                            <span class="mx-2">
                                ${item.quantity}
                            </span>

                            <button class="btn btn-sm btn-success"
                                onclick="changeQty(${item.id}, 1)">
                                +
                            </button>
                        </td>

                        <td>
                            ${subtotal.toLocaleString()} VNĐ
                        </td>

                        <td>
                            <button class="btn btn-danger btn-sm"
                                onclick="removeItem(${item.id})">
                                Xóa
                            </button>
                        </td>

                    </tr>
                `;
            });

            document.getElementById("cart-body").innerHTML = html;

            document.getElementById("total-price").innerText =
                total.toLocaleString() + " VNĐ";
        }

        function changeQty(id, value) {

            let cart = JSON.parse(localStorage.getItem("trasua_cart")) || [];

            let item = cart.find(p => p.id === id);

            if (!item) return;

            item.quantity += value;

            if (item.quantity <= 0) {
                cart = cart.filter(p => p.id !== id);
            }

            localStorage.setItem(
                "trasua_cart",
                JSON.stringify(cart)
            );

            loadCart();
        }

        function removeItem(id) {

            let cart = JSON.parse(localStorage.getItem("trasua_cart")) || [];

            cart = cart.filter(item => item.id !== id);

            localStorage.setItem(
                "trasua_cart",
                JSON.stringify(cart)
            );

            loadCart();
        }
         function checkout() {

              let cart = JSON.parse(localStorage.getItem("trasua_cart")) || [];

                    if (cart.length === 0) {
                       alert("Giỏ hàng đang trống!");
                     return;
                      }

                     document.getElementById("message").style.display = "block";

                      setTimeout(function () {
                         document.getElementById("message").style.display = "none";
                         }, 3000);

                     localStorage.removeItem("trasua_cart");

             loadCart();
        }

        loadCart();
        

    </script>

</body>
</html>
