<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Thực đơn Trà Sữa & Ăn Vặt</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">


    <!-- Header -->
    <header class="main-header text-white py-3 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
           <a href="../index.html" class="btn btn-outline-light">
                <i class="bi bi-house-fill"></i> 
                Trang chủ
            </a>
            <a class="text-white text-decoration-none">
                <span class="fs-4 fw-bold">
                    TRÀ SỮA & ĂN VẶT
                </span>
            </a>

 <div class="d-flex align-items-center gap-4">


            <a href="gioi-thieu.html" class="text-white text-decoration-none">
                Giới thiệu
            </a>

            <a href="lien-he.html" class="text-white text-decoration-none">
                Liên hệ
            </a>

            <a href="gio-hang.html" class="text-white text-decoration-none position-relative d-flex align-items-center gap-2">
                <div class="position-relative">
                    <span class="fs-4">🛒</span>
                    <span id="cart-count"
                          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                          style="font-size: 0.65rem;">
                        0
                    </span>
                </div>

                <span class="d-none d-sm-inline ms-1">Giỏ hàng</span>
                <div id="message"></div>
            </a>

        </div>
        

    </div>
    </header>


    <!-- Danh sách sản phẩm -->
    <div class="container mb-5 mt-4">

        <h2 class="mb-4 fw-bold text-dark border-bottom pb-2">
            Thực đơn
        </h2>

        <div class="mb-4 d-flex gap-2 flex-wrap">

            <button
                class="btn btn-dark active"
                onclick="filterData('all')">
                Tất cả
            </button>

            <button
                class="btn btn-outline-primary"
                onclick="filterData('trasua')">
                Trà sữa
            </button>

            <button
                class="btn btn-outline-success"
                onclick="filterData('tra')">
                Trà trái cây
            </button>

            <button
                class="btn btn-outline-warning"
                onclick="filterData('anvat')">
                Đồ ăn vặt
            </button>

        </div>

        <div
            class="product-list row row-cols-2 row-cols-md-4 g-3"
            id="product-list">
        </div>

    </div>
       <!-- Thanh thông báo -->
<div class="top-bar text-white d-none d-md-block"
     style="background-color: #6f42c1; font-size: 16px; height: 50px;">
    
    <div class="container h-100 d-flex justify-content-between align-items-center">
        
        <div class="d-flex align-items-center gap-2">
            <span class="badge bg-warning text-dark text-uppercase px-2 py-1 fw-bold">
                HOT
            </span>

            <span>
                Mua 2 trà sữa bất kỳ tặng ngay topping trân châu miễn phí!
            </span>
        </div>

       

    </div>
</div>

    <script>

        function renderDefault() {

            const container =
            document.getElementById("product-list");

            if (!container) return;

            container.innerHTML = "";

            productlist.forEach(function(item){

                addproduct(
                    item.id,
                    item.name,
                    item.price,
                    item.image,
                    item.productLink
                );

            });
        }

       function filterData(type) {

    const container =
    document.getElementById("product-list");

    if (!container) return;

    container.innerHTML = "";

    productlist.forEach(function(item){

        if(type === "all"){

            addproduct(
                item.id,
                item.name,
                item.price,
                item.image,
                item.productLink
            );
        }

        else if(
            type === "trasua" &&
            item.cat === "trasua"
        ){

            addproduct(
                item.id,
                item.name,
                item.price,
                item.image,
                item.productLink
            );
        }

        else if(
            type === "anvat" &&
            item.cat === "anvat"
        ){

            addproduct(
                item.id,
                item.name,
                item.price,
                item.image,
                item.productLink
            );
        }
        else if(
            type === "tra" &&
            item.cat === "tra"
        ){

            addproduct(
                item.id,
                item.name,
                item.price,
                item.image,
                item.productLink
            );
        }
    });
}

        window.onload = function(){

            renderDefault();

            if(typeof updateCartBadge === "function"){
                updateCartBadge();
            }

            const filterButtons =
            document.querySelectorAll(".mb-4 .btn");

            filterButtons.forEach(function(btn){

                btn.addEventListener("click", function(){

                    filterButtons.forEach(function(b){
                        b.classList.remove("active");
                    });

                    this.classList.add("active");
                });
            });
        };

    </script>

</body>
</html>
